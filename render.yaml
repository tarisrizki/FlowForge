services:
  - type: web
    name: fastapi-workflow-engine
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: workflow-db
          property: connectionString
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false


databases:
  - name: workflow-db
    databaseName: fastapi_db
    user: db_user
    plan: free
